# Environment exported by Hyprland before clients start.
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = MOZ_ENABLE_WAYLAND,1

# Keep Qt/KDE and GTK applications on the same dark theme as the labwc setup.
env = QT_QPA_PLATFORMTHEME,kde
env = GTK_THEME,BL-Lithium-dark
env = XCURSOR_SIZE,24

# Quickshell runtime switches.
env = QS_COMPOSITOR,hyprland

# Default keyboard layout. Override in hyprland.conf if needed.
env = XKB_DEFAULT_LAYOUT,jp
